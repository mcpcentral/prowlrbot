name: Security Scanning

on:
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  # ---------------------------------------------------------------------------
  # CodeQL analysis for Python and JavaScript
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        with:
          category: "/language:${{ matrix.language }}"

  # ---------------------------------------------------------------------------
  # Python dependency audit
  # ---------------------------------------------------------------------------
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pip-audit

      - name: Run pip-audit (fail on high/critical only)
        run: |
          pip-audit --desc on --format columns 2>&1 | tee audit-output.txt || true
          if grep -qiE "^.*\s+(high|critical)\s+" audit-output.txt; then
            echo "::error::High or critical Python dependency vulnerabilities detected"
            exit 1
          fi
          echo "No high/critical vulnerabilities found."

  # ---------------------------------------------------------------------------
  # npm audit for console and website
  # ---------------------------------------------------------------------------
  npm-audit:
    name: npm audit (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: console
            manager: npm
          - project: website
            manager: pnpm
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        if: matrix.manager == 'pnpm'
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642195f572a2b937b190fe8 # v4.4.0
        with:
          node-version: "20"

      - name: Audit (npm)
        if: matrix.manager == 'npm'
        working-directory: ${{ matrix.project }}
        run: |
          npm ci
          # Only fail on critical severity
          npm audit --audit-level=critical

      - name: Audit (pnpm)
        if: matrix.manager == 'pnpm'
        working-directory: ${{ matrix.project }}
        run: |
          pnpm install --frozen-lockfile
          AUDIT_OUTPUT=$(pnpm audit 2>&1 || true)
          echo "$AUDIT_OUTPUT"
          if echo "$AUDIT_OUTPUT" | grep -qi "critical"; then
            echo "::error::Critical npm vulnerability found in ${{ matrix.project }}"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Trivy filesystem scan
  # ---------------------------------------------------------------------------
  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e7f25d18f1229e49 # v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          format: table
