# fly.toml — ProwlrBot on Fly.io
#
# Quick start:
#   fly auth login
#   fly apps create prowlrbot
#   fly volumes create prowlrbot_data --region sjc --size 3
#   fly secrets set PROWLRBOT_SECRET_KEY="$(openssl rand -hex 32)"
#   fly secrets set ANTHROPIC_API_KEY="sk-ant-..."
#   fly deploy
#
# Use the app via your custom domain (recommended):
#   fly certs add app.prowlrbot.com
#   Point DNS: A/AAAA app.prowlrbot.com → fly ips list
#   Then use https://app.prowlrbot.com — avoid prowlrbot.fly.dev for production;
#   the .fly.dev URL can show "not loading" for 30–90s after deploy while the app starts.

app = "prowlrbot"
primary_region = "sjc"

[build]
  dockerfile = "deploy/Dockerfile.fly"

[env]
  PROWLRBOT_PORT            = "8088"
  PROWLRBOT_WORKING_DIR     = "/data/.prowlrbot"
  PROWLRBOT_SECRET_DIR      = "/data/.prowlrbot.secret"
  PROWLRBOT_RUNNING_IN_CONTAINER = "1"
  PROWLR_OFFICIAL_APP       = "1"
  NODE_ENV                  = "production"
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"

[mounts]
  source      = "prowlrbot_data"
  destination = "/data"

[http_service]
  internal_port        = 8088
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

# App startup (runner, channels, cron, MCP) takes ~30–90s; grace avoids marking unhealthy during that time.
# Use https://app.prowlrbot.com (custom domain); prowlrbot.fly.dev may be slow on first load after deploy.
[[http_service.checks]]
  grace_period = "120s"
  interval     = "15s"
  method       = "GET"
  path         = "/api/health"
  timeout      = "5s"

[[http_service.checks]]
  grace_period = "120s"
  interval     = "60s"
  method       = "GET"
  path         = "/roar/health"
  timeout      = "5s"

[[vm]]
  size   = "shared-cpu-2x"
  memory = "1gb"

[deploy]
  strategy        = "rolling"
  release_command = "prowlr init --defaults --accept-security"
