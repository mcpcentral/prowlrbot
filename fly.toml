# fly.toml — ProwlrBot on Fly.io
#
# Quick start:
#   fly auth login
#   fly apps create prowlrbot
#   fly volumes create prowlrbot_data --region sjc --size 3
#   fly secrets set PROWLRBOT_SECRET_KEY="$(openssl rand -hex 32)"
#   fly secrets set ANTHROPIC_API_KEY="sk-ant-..."
#   fly deploy
#
# Custom domains (after deploy):
#   fly certs add api.prowlrbot.com
#   → adds Cloudflare CNAME: api → prowlrbot.fly.dev

app = "prowlrbot"
primary_region = "sjc"

[build]
  dockerfile = "deploy/Dockerfile.fly"

[env]
  PROWLRBOT_PORT            = "8088"
  PROWLRBOT_WORKING_DIR     = "/data/.prowlrbot"
  PROWLRBOT_SECRET_DIR      = "/data/.prowlrbot.secret"
  PROWLRBOT_RUNNING_IN_CONTAINER = "1"
  NODE_ENV                  = "production"
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"

[mounts]
  source      = "prowlrbot_data"
  destination = "/data"

[http_service]
  internal_port        = 8088
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

# App startup (init, memory, channels) can take ~30–60s; grace allows listen before fail
[[http_service.checks]]
  grace_period = "90s"
  interval     = "15s"
  method       = "GET"
  path         = "/api/health"
  timeout      = "5s"

[[http_service.checks]]
  grace_period = "90s"
  interval     = "60s"
  method       = "GET"
  path         = "/roar/health"
  timeout      = "5s"

[[vm]]
  size   = "shared-cpu-2x"
  memory = "1gb"

[deploy]
  strategy        = "rolling"
  release_command = "prowlr init --defaults --accept-security"
