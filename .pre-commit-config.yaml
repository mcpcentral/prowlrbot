repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: check-ast
        exclude: '.*/skills/.*'
      - id: sort-simple-yaml
        exclude: '.*/skills/.*'
      - id: check-yaml
        exclude: |
          (?x)^(
              meta.yaml
          )$
      - id: check-xml
        exclude: '.*/skills/.*|^website/.*\.svg$|^console/.*\.svg$'
      - id: check-toml
      - id: check-docstring-first
        exclude: '.*/skills/.*'
      - id: check-json
        exclude: '.*/skills/.*'
      - id: fix-encoding-pragma
        exclude: '.*/skills/.*'
      - id: detect-private-key
        exclude: '^\.env\.example$'
      - id: trailing-whitespace
        exclude: '.*/skills/.*'
  - repo: https://github.com/asottile/add-trailing-comma
    rev: v3.1.0
    hooks:
      - id: add-trailing-comma
        exclude: '.*/skills/.*'
  # mypy: run separately with `mypy src/`; 131+ type errors exist, fix incrementally
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.7.0
  #   hooks:
  #     - id: mypy
  #       ...
  - repo: https://github.com/psf/black
    rev: 23.3.0
    hooks:
      - id: black
        args: [ --line-length=88 ]
        exclude: '.*/skills/.*'
  - repo: https://github.com/PyCQA/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        args: [ "--max-line-length=88", "--jobs=1", "--extend-ignore=E203,E402,E501,E226,F541,E741,F841,F821,F811,E401" ]
        exclude: '.*/skills/.*'
  # pylint: many style/import issues; run separately with `pylint src/ tests/`
  # - repo: https://github.com/pylint-dev/pylint
  #   rev: v3.0.2
  #   hooks:
  #     - id: pylint
  #       exclude: ...
  #       args: [ ... ]
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: 'v3.0.0'
    hooks:
      - id: prettier
        additional_dependencies: [ 'prettier@3.0.0' ]
        files: \.(tsx?)$
        exclude: '(?x)(^web/|^console/|/dist/|.*/skills/.*)'