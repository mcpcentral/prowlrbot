services:
  redis:
    image: redis:7-alpine
    container_name: swarm_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - swarm_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: ./swarm/worker
      dockerfile: Dockerfile
    container_name: swarm_worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BRIDGE_HOST=${BRIDGE_HOST:-100.x.x.x}
      - BRIDGE_PORT=8765
      - HMAC_SECRET=${HMAC_SECRET}
      - POLL_INTERVAL=${POLL_INTERVAL:-5}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - swarm_network
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  redis_data:

networks:
  swarm_network:
    driver: bridge
